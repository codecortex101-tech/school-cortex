{% load i18n %}

{% if filter.form %}
<div class="filter-modern">
    <div class="filter-header" id="filterHeader">
        <div class="filter-header-left">
            <i class="fas fa-filter"></i>
            <span>{% trans 'Advanced Filters' %}</span>
            {% if request.GET.urlencode %}
            <span class="active-filters-badge" id="activeFiltersCount">{{ request.GET|length }}</span>
            {% endif %}
        </div>
        <button type="button" class="filter-toggle-btn" id="filterToggleBtn" aria-label="Toggle filters">
            <i class="fas fa-chevron-down" id="filterToggleIcon"></i>
        </button>
    </div>
    
    <div class="filter-body" id="filterBody" style="display: none;">
        <form action="" method="get" id="filterForm">
            <div class="filter-grid">
                {% for field in filter.form %}
                <div class="filter-group">
                    <label for="{{ field.id_for_label }}" class="filter-label">
                        <i class="fas {% if 'search' in field.name %}fa-search{% elif 'date' in field.name %}fa-calendar{% elif 'status' in field.name %}fa-chart-line{% else %}fa-tag{% endif %}"></i>
                        {{ field.label }}
                    </label>
                    <div class="filter-input-wrapper">
                        {{ field }}
                        {% if field.value %}
                        <button type="button" class="filter-clear" data-field="{{ field.name }}" title="{% trans 'Clear filter' %}">
                            <i class="fas fa-times-circle"></i>
                        </button>
                        {% endif %}
                    </div>
                    {% if field.help_text %}
                    <small class="filter-help">{{ field.help_text }}</small>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
            
            <div class="filter-actions">
                <button type="submit" class="btn-filter-apply" id="filterApplyBtn">
                    <i class="fas fa-check-circle"></i>
                    <span>{% trans 'Apply Filters' %}</span>
                </button>
                <button type="button" class="btn-filter-reset" id="filterResetBtn">
                    <i class="fas fa-undo-alt"></i>
                    <span>{% trans 'Reset All' %}</span>
                </button>
                <button type="button" class="btn-filter-clear" id="filterClearBtn" style="display: none;">
                    <i class="fas fa-times-circle"></i>
                    <span>{% trans 'Clear Filters' %}</span>
                </button>
            </div>
        </form>
    </div>
</div>

<style>
/* Filter Container */
.filter-modern {
    background: var(--card-bg, white);
    border-radius: var(--radius-xl);
    border: 1px solid var(--gray-200);
    margin-bottom: 1.5rem;
    overflow: hidden;
    transition: var(--transition-base);
}

.filter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1.25rem;
    background: var(--gray-50);
    cursor: pointer;
    transition: var(--transition-fast);
}

.filter-header:hover {
    background: var(--gray-100);
}

[data-theme="dark"] .filter-header {
    background: var(--gray-800);
}

[data-theme="dark"] .filter-header:hover {
    background: var(--gray-700);
}

.filter-header-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--gray-700);
}

.filter-header-left i {
    color: var(--primary);
}

.active-filters-badge {
    background: var(--primary);
    color: white;
    font-size: 0.6rem;
    padding: 0.125rem 0.5rem;
    border-radius: 20px;
    margin-left: 0.5rem;
}

.filter-toggle-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.25rem;
    color: var(--gray-500);
    transition: var(--transition-fast);
}

.filter-toggle-btn:hover {
    color: var(--primary);
}

.filter-toggle-btn i {
    transition: transform 0.3s;
}

.filter-modern.open .filter-toggle-btn i {
    transform: rotate(180deg);
}

/* Filter Body */
.filter-body {
    padding: 1.25rem;
    border-top: 1px solid var(--gray-200);
}

.filter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 1.25rem;
}

/* Filter Group */
.filter-group {
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
}

.filter-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.filter-label i {
    margin-right: 0.25rem;
    font-size: 0.65rem;
    color: var(--primary);
}

.filter-input-wrapper {
    position: relative;
}

.filter-input-wrapper input,
.filter-input-wrapper select {
    width: 100%;
    padding: 0.5rem 2rem 0.5rem 0.75rem;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    font-size: 0.8rem;
    transition: var(--transition-fast);
    background: white;
}

[data-theme="dark"] .filter-input-wrapper input,
[data-theme="dark"] .filter-input-wrapper select {
    background: var(--gray-700);
    border-color: var(--gray-600);
    color: var(--gray-200);
}

.filter-input-wrapper input:focus,
.filter-input-wrapper select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
}

.filter-input-wrapper input:hover,
.filter-input-wrapper select:hover {
    border-color: var(--primary-light);
}

.filter-clear {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-400);
    padding: 0.125rem;
    border-radius: 50%;
    transition: var(--transition-fast);
}

.filter-clear:hover {
    color: var(--error);
}

.filter-help {
    font-size: 0.6rem;
    color: var(--gray-400);
    margin-top: 0.25rem;
}

/* Filter Actions */
.filter-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    padding-top: 0.75rem;
    border-top: 1px solid var(--gray-200);
}

.btn-filter-apply,
.btn-filter-reset,
.btn-filter-clear {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: var(--radius-md);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition-fast);
    border: none;
}

.btn-filter-apply {
    background: var(--primary);
    color: white;
}

.btn-filter-apply:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

.btn-filter-reset {
    background: var(--gray-200);
    color: var(--gray-700);
}

.btn-filter-reset:hover {
    background: var(--gray-300);
    transform: translateY(-1px);
}

.btn-filter-clear {
    background: var(--error-bg);
    color: var(--error);
}

.btn-filter-clear:hover {
    background: var(--error);
    color: white;
}

/* Responsive */
@media (max-width: 768px) {
    .filter-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
    }
    
    .filter-actions {
        flex-wrap: wrap;
    }
    
    .btn-filter-apply,
    .btn-filter-reset,
    .btn-filter-clear {
        flex: 1;
        justify-content: center;
    }
    
    .filter-body {
        padding: 1rem;
    }
}
</style>

<script>
// Filter toggle functionality
document.addEventListener('DOMContentLoaded', function() {
    const filterContainer = document.querySelector('.filter-modern');
    const filterBody = document.getElementById('filterBody');
    const filterToggleBtn = document.getElementById('filterToggleBtn');
    const filterResetBtn = document.getElementById('filterResetBtn');
    const filterClearBtn = document.getElementById('filterClearBtn');
    const filterApplyBtn = document.getElementById('filterApplyBtn');
    const filterForm = document.getElementById('filterForm');
    
    // Load saved filter state from localStorage
    const savedState = localStorage.getItem('filterState');
    if (savedState === 'open' && filterBody) {
        filterBody.style.display = 'block';
        filterContainer.classList.add('open');
    } else if (filterBody) {
        filterBody.style.display = 'none';
    }
    
    // Toggle filter visibility
    if (filterToggleBtn) {
        filterToggleBtn.addEventListener('click', function() {
            if (filterBody.style.display === 'none') {
                filterBody.style.display = 'block';
                filterContainer.classList.add('open');
                localStorage.setItem('filterState', 'open');
            } else {
                filterBody.style.display = 'none';
                filterContainer.classList.remove('open');
                localStorage.setItem('filterState', 'closed');
            }
        });
    }
    
    // Clear individual filter
    document.querySelectorAll('.filter-clear').forEach(clearBtn => {
        clearBtn.addEventListener('click', function() {
            const fieldName = this.getAttribute('data-field');
            const input = document.querySelector(`[name="${fieldName}"]`);
            if (input) {
                input.value = '';
                // Trigger change event to update form
                const event = new Event('change', { bubbles: true });
                input.dispatchEvent(event);
            }
            this.remove();
        });
    });
    
    // Reset all filters
    if (filterResetBtn) {
        filterResetBtn.addEventListener('click', function() {
            const form = document.getElementById('filterForm');
            if (form) {
                form.reset();
                // Remove all clear buttons
                document.querySelectorAll('.filter-clear').forEach(btn => btn.remove());
                // Submit the form to reset filters
                form.submit();
            }
        });
    }
    
    // Apply filters with loading state
    if (filterApplyBtn && filterForm) {
        filterApplyBtn.addEventListener('click', function(e) {
            e.preventDefault();
            filterApplyBtn.disabled = true;
            filterApplyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>{% trans "Applying..." %}</span>';
            filterForm.submit();
        });
    }
    
    // Auto-submit on enter key in inputs
    const inputs = document.querySelectorAll('.filter-input-wrapper input, .filter-input-wrapper select');
    inputs.forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (filterForm) filterForm.submit();
            }
        });
    });
    
    // Show clear all button if any filter is active
    const urlParams = new URLSearchParams(window.location.search);
    const hasActiveFilters = Array.from(urlParams.keys()).some(key => 
        key !== 'page' && urlParams.get(key) && urlParams.get(key) !== ''
    );
    
    if (hasActiveFilters && filterClearBtn) {
        filterClearBtn.style.display = 'inline-flex';
    }
    
    // Clear all filters button
    if (filterClearBtn) {
        filterClearBtn.addEventListener('click', function() {
            // Get current URL without query parameters
            const url = window.location.pathname;
            window.location.href = url;
        });
    }
});
</script>

{% endif %}
